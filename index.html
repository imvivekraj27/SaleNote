<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Sales Notebook</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background-color: #f0f8ff;
    margin: 0;
    padding: 20px;
    color: #333;
  }
  header {
    text-align: center;
    padding: 10px 0;
    background-color: #4CAF50;
    color: white;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    margin-bottom: 20px;
  }
  h1 {
    margin: 0;
    font-size: 2em;
  }
  .datetime {
    font-size: 1em;
    margin-top: 5px;
  }
  .container {
    max-width: 1000px;
    margin: auto;
  }
  form {
    background-color: #ffffff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    margin-bottom: 30px;
  }
  form h2 {
    margin-top: 0;
    text-align: center;
    color: #4CAF50;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
  }
  label {
    font-weight: bold;
    margin-bottom: 5px;
  }
  input[type="text"],
  input[type="number"] {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  button {
    background-color: #4CAF50;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1em;
    transition: background-color 0.3s;
  }
  button:hover {
    background-color: #45a049;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 12px;
    text-align: center;
  }
  th {
    background-color: #4CAF50;
    color: white;
  }
  tfoot td {
    font-weight: bold;
    background-color: #f9f9f9;
  }
  .summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }
  .print-btn {
    padding: 10px 20px;
    background-color: #2196F3;
    color: white;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-size: 1em;
  }
  .print-btn:hover {
    background-color: #0b7dda;
  }
  @media print {
    .no-print {
      display: none;
    }
  }
</style>
</head>
<body>
<header>
  <h1>Daily Sales Notebook</h1>
  <div class="datetime" id="currentDateTime"></div>
</header>

<div class="container">
  <section class="no-print">
    <form id="saleForm">
      <h2>Add Daily Sale Record</h2>
      <div class="form-group">
        <label for="productName">Product Name</label>
        <input type="text" id="productName" required />
      </div>
      <div class="form-group">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" min="1" required />
      </div>
      <div class="form-group">
        <label for="price">Price per Unit (₹)</label>
        <input type="number" id="price" min="0" step="0.01" required />
      </div>
      <button type="submit">Add Record</button>
    </form>
  </section>

  <h2>Today's Sales Records</h2>
  <table id="salesTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Date & Time</th>
        <th>Product Name</th>
        <th>Quantity</th>
        <th>Price per Unit (₹)</th>
        <th>Total (₹)</th>
        <th class="no-print">Actions</th>
      </tr>
    </thead>
    <tbody>
      <!-- Records will appear here -->
    </tbody>
    <tfoot>
      <tr>
        <td colspan="5">Total Sales (₹)</td>
        <td id="totalSum">0.00</td>
        <td class="no-print"></td>
      </tr>
    </tfoot>
  </table>

  <div class="summary">
    <div id="monthlySummary">
      <h3>Monthly Summary</h3>
      <p>Total Sales: ₹<span id="monthlyTotal">0.00</span></p>
    </div>
    <button class="print-btn no-print" onclick="window.print()">Print Monthly Details</button>
  </div>
</div>

<script>
  // Function to update current date and time
  function updateDateTime() {
    const now = new Date();
    const options = { year: 'numeric', month: 'long', day: 'numeric', 
                      hour: '2-digit', minute: '2-digit', second: '2-digit' };
    document.getElementById('currentDateTime').textContent = now.toLocaleString('en-IN', options);
  }

  setInterval(updateDateTime, 1000);
  updateDateTime();

  const salesTableBody = document.querySelector('#salesTable tbody');
  const totalSumElem = document.getElementById('totalSum');
  const monthlyTotalElem = document.getElementById('monthlyTotal');

  let salesRecords = [];
  let monthlyTotal = 0;

  // Load data from localStorage if exists
  const storedData = localStorage.getItem('salesRecords');
  if (storedData) {
    salesRecords = JSON.parse(storedData);
    salesRecords.forEach(record => addRecordToTable(record));
    updateTotal();
  }

  document.getElementById('saleForm').addEventListener('submit', function(e) {
    e.preventDefault();
    addNewRecord();
  });

  function addNewRecord() {
    const productName = document.getElementById('productName').value.trim();
    const quantity = parseFloat(document.getElementById('quantity').value);
    const price = parseFloat(document.getElementById('price').value);
    const dateTime = new Date();

    if (productName && quantity > 0 && price >= 0) {
      const total = (quantity * price).toFixed(2);
      const record = {
        id: Date.now(),
        dateTime: dateTime.toISOString(),
        productName,
        quantity,
        price,
        total
      };
      salesRecords.push(record);
      saveData();
      addRecordToTable(record);
      updateTotal();
      document.getElementById('saleForm').reset();
    }
  }

  function addRecordToTable(record) {
    const row = document.createElement('tr');

    row.innerHTML = `
      <td></td>
      <td>${new Date(record.dateTime).toLocaleString('en-IN')}</td>
      <td>${record.productName}</td>
      <td>${record.quantity}</td>
      <td>₹${record.price.toFixed(2)}</td>
      <td>₹${record.total}</td>
      <td class="no-print">
        <button onclick="deleteRecord(${record.id})">Delete</button>
      </td>
    `;

    // Add serial number
    row.querySelector('td').textContent = salesTableBody.children.length + 1;

    salesTableBody.appendChild(row);
  }

  function deleteRecord(id) {
    salesRecords = salesRecords.filter(rec => rec.id !== id);
    saveData();
    renderTable();
    updateTotal();
  }

  function renderTable() {
    salesTableBody.innerHTML = '';
    salesRecords.forEach((record, index) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${index + 1}</td>
        <td>${new Date(record.dateTime).toLocaleString('en-IN')}</td>
        <td>${record.productName}</td>
        <td>${record.quantity}</td>
        <td>₹${record.price.toFixed(2)}</td>
        <td>₹${record.total}</td>
        <td class="no-print">
          <button onclick="deleteRecord(${record.id})">Delete</button>
        </td>
      `;
      salesTableBody.appendChild(row);
    });
  }

  function updateTotal() {
    const total = salesRecords.reduce((sum, rec) => sum + parseFloat(rec.total), 0);
    totalSumElem.textContent = total.toFixed(2);
    updateMonthlyTotal(total);
  }

  function updateMonthlyTotal(currentTotal) {
    // For simplicity, sum only today's records for monthly total
    // In real case, we'd filter by month; here, we sum all records for demo
    // Alternatively, implement month filtering if needed
    const monthStart = new Date().setDate(1);
    const monthRecords = salesRecords.filter(rec => {
      const recDate = new Date(rec.dateTime);
      return recDate >= new Date(monthStart);
    });
    const monthlySum = monthRecords.reduce((sum, rec) => sum + parseFloat(rec.total), 0);
    monthlyTotalElem.textContent = monthlySum.toFixed(2);
  }

  function saveData() {
    localStorage.setItem('salesRecords', JSON.stringify(salesRecords));
  }
</script>
</body>
</html>
